name: Build CS2FaceitLevels

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build CSSharp plugin
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore CS2FaceitLevels.csproj

      - name: Publish
        run: dotnet publish CS2FaceitLevels.csproj -c Release -o publish

      - name: Create package zip
        run: |
          mkdir -p package/addons/counterstrikesharp/plugins/CS2FaceitLevels

          cp publish/CS2FaceitLevels.dll package/addons/counterstrikesharp/plugins/CS2FaceitLevels/CS2FaceitLevels.dll

          echo "Package files:"
          find package -type f | sort

          test -f package/addons/counterstrikesharp/plugins/CS2FaceitLevels/CS2FaceitLevels.dll
          test ! -f package/addons/counterstrikesharp/configs/plugins/CS2FaceitLevels/CS2FaceitLevels.json

          cd package
          zip -r ../CS2FaceitLevels.zip addons

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CS2FaceitLevels
          path: CS2FaceitLevels.zip

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="cssharp-build-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"

          cat > release-notes.md <<EOF_NOTES
          build for CS2FaceitLevels.

          gh release create "$TAG" \
            CS2FaceitLevels.zip \
            --title "CS2FaceitLevels CSSharp Build #${GITHUB_RUN_NUMBER}" \
            --notes-file release-notes.md \
            --target "$GITHUB_SHA"
